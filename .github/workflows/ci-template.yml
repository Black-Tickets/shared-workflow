name: CI Template

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
      service-path:
        required: true
        type: string
      runtime:
        required: false
        type: string
        default: "node"
      node-version:
        required: false
        type: string
        default: "18"
      python-version:
        required: false
        type: string
        default: "3.11"
      environment:
        required: true
        type: string
      sonar-enabled:
        required: false
        type: boolean
        default: true
      notifications-enabled:
        required: false
        type: boolean
        default: false
      sonar-project-key:
        required: false
        type: string
        default: ""

    secrets:
      SNYK_TOKEN:
        required: true
      SONAR_TOKEN:
        required: true
      SONAR_URL:
        required: true
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      BREVO_API_KEY:
        required: false

jobs:
  code-quality:
    name: "Code Quality - ${{ inputs.service-name }}"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    concurrency:
      group: code-quality-${{ inputs.service-name }}-${{ inputs.environment }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    defaults:
      run:
        working-directory: ${{ inputs.service-path }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # SAST
      - name: Sonar Scan
        id: sonar-scan
        if: inputs.sonar-enabled == true && inputs.sonar-project-key != ''
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_URL }}
        with:
          projectBaseDir: ${{ inputs.service-path }}
          args: >
            -Dsonar.projectKey=${{ inputs.sonar-project-key }}
            -Dsonar.projectName=${{ inputs.service-name }}
            -Dsonar.sources=.
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/build/**
            -Dsonar.qualitygate.wait=${{ inputs.environment == 'main' && 'true' || 'false' }}

      - name: Setup Node.js
        if: inputs.runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"
          cache-dependency-path: "${{ inputs.service-path }}/package.json"

      - name: Setup Python
        if: inputs.runtime == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: "pip"

      - name: Install Node dependencies
        if: inputs.runtime == 'node'
        run: npm install

      - name: Check unused dependencies(node)
        if: inputs.runtime == 'node'
        run: npx depcheck || true

      - name: Install Python dependencies
        if: inputs.runtime == 'python'
        run: pip install -r requirements.txt

      #SCA snyk VUL
      - name: Setup Snyk CLI
        uses: snyk/actions/setup@master

      - name: Install snyk-to-html
        run: npm install -g snyk-to-html

      - name: Snyk - Scan dependencies (Node)
        if: inputs.runtime == 'node'
        id: snyk-node
        continue-on-error: ${{ inputs.environment != 'main' }}
        run: snyk test --severity-threshold=high --json-file-output=snyk-report.json
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Convert Snyk report to HTML(node)
        if: inputs.runtime == 'node'
        run: snyk-to-html -i snyk-report.json -o snyk-report.html

      - name: Snyk - Scan dependencies (Python)
        if: inputs.runtime == 'python'
        id: snyk-python
        continue-on-error: ${{ inputs.environment != 'main' }}
        run: snyk test --file=requirements.txt --package-manager=pip --severity-threshold=high --json-file-output=snyk-report.json
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Convert Snyk report to HTML(python)
        if: inputs.runtime == 'python'
        run: snyk-to-html -i snyk-report.json -o snyk-report.html

      - name: Upload Snyk HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-report-${{ inputs.service-name }}
          path: ${{ inputs.service-path }}/snyk-report.html
          retention-days: 14

      - name: Check for Critical Vulnerabilities
        id: snyk-check
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          REPORT_PATH="${{ inputs.service-path }}/snyk-report.json"
          if [ ! -f "$REPORT_PATH" ]; then
            echo "snyk-report.json not found at $REPORT_PATH, skipping vulnerability check"
            echo "critical_found=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          CRITICAL_COUNT=$(jq '[.vulnerabilities[] | select(.severity == "critical" or .severity == "high")] | length' "$REPORT_PATH" 2>/dev/null || echo "0")
          echo "Critical count: $CRITICAL_COUNT"
          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "critical_found=true" >> $GITHUB_OUTPUT
          else
            echo "critical_found=false" >> $GITHUB_OUTPUT
          fi

      - name: Send Email Alert with Report (Brevo)
        if: steps.snyk-check.outputs.critical_found == 'true' && inputs.notifications-enabled == true
        continue-on-error: true
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: |
          if [ -z "$BREVO_API_KEY" ]; then
            echo "BREVO_API_KEY not set, skipping notification"
            exit 0
          fi
          REPORT_BASE64=$(base64 -w 0 ${{ inputs.service-path }}/snyk-report.html)

          curl --request POST \
            --url https://api.brevo.com/v3/smtp/email \
            --header "accept: application/json" \
            --header "api-key: $BREVO_API_KEY" \
            --header "content-type: application/json" \
            --data "{\
              \"sender\": {\
                \"name\": \"CI Pipeline\",\
                \"email\": \"ananthvijay2003@gmail.com\"\
              },\
              \"to\": [{\
                \"email\": \"ananthvijay2003@gmail.com\"\
              }],\
              \"subject\": \"🚨 Critical Vulnerabilities Detected\",\
              \"textContent\": \"Critical vulnerabilities found. See attached Snyk report.\",\
              \"attachment\": [{\
                \"name\": \"snyk-report.html\",\
                \"content\": \"$REPORT_BASE64\"\
              }]\
            \}"

  build-publish:
    name: "Build & Publish - ${{ inputs.service-name }}"
    runs-on: ubuntu-latest
    needs: [code-quality]
    if: needs.code-quality.result == 'success'
    concurrency:
      group: build-publish-${{ inputs.service-name }}-${{ inputs.environment }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    defaults:
      run:
        working-directory: ${{ inputs.service-path }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate Semantic Version (Main Only)
        id: semver
        if: inputs.environment == 'main'
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ github.token }}
          tag_prefix: "v"
          dry_run: true
          default_bump: patch

      - name: Generate Tag
        id: tag
        run: |
          if [ "${{ inputs.environment }}" = "main" ]; then
            echo "tag=${{ steps.semver.outputs.new_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=dev-${GITHUB_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Validate existing tag
        id: tag_check
        run: |
          TAG=${{ steps.tag.outputs.tag }}

          # Force fetch remote tags to ensure the local index knows about them
          git fetch --tags origin || true

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            TAG_COMMIT=$(git rev-list -n 1 "$TAG")
            CURRENT_COMMIT=$(git rev-parse HEAD)

            if [ "$TAG_COMMIT" != "$CURRENT_COMMIT" ]; then
              echo "Tag exists but points to different commit!"
              exit 1
            fi

            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Login to Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Check Docker image
        id: image_check
        run: |
          if docker manifest inspect ${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}:${{ steps.tag.outputs.tag }} > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker Image
        id: build
        if: steps.image_check.outputs.exists != 'true'
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}:${{ steps.tag.outputs.tag }} .
          echo "built=true" >> $GITHUB_OUTPUT

      - name: Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        if: steps.build.outputs.built == 'true'
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}:${{ steps.tag.outputs.tag }}'
          format: 'table'
          output: '${{ github.workspace }}/trivy-report-${{ inputs.service-name }}.txt'
          scan-type: 'image'
          severity: 'CRITICAL'
          exit-code: ${{ inputs.environment == 'main' && '1' || '0' }}
          ignore-unfixed: false
          vuln-type: 'os,library'

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        if: always() && steps.build.outputs.built == 'true'
        with:
          name: trivy-${{ inputs.service-name }}
          path: '${{ github.workspace }}/trivy-report-${{ inputs.service-name }}.txt'
          retention-days: 14

      - name: Check Trivy for High or Critical Vulnerabilities
        id: trivy-check
        if: always() && steps.build.outputs.built == 'true'
        run: |
          REPORT_FILE="${{ github.workspace }}/trivy-report-${{ inputs.service-name }}.txt"
          if [ ! -f "$REPORT_FILE" ]; then
            echo "Trivy report not found, skipping vulnerability check"
            echo "critical_found=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          if grep -qE "CRITICAL" "$REPORT_FILE"; then
            echo "critical_found=true" >> $GITHUB_OUTPUT
          else
            echo "critical_found=false" >> $GITHUB_OUTPUT
          fi

      - name: Send Trivy Alert (Brevo)
        if: steps.trivy-check.outputs.critical_found == 'true' && inputs.notifications-enabled == true
        continue-on-error: true
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: |
          if [ -z "$BREVO_API_KEY" ]; then
            echo "BREVO_API_KEY not set, skipping notification"
            exit 0
          fi
          REPORT_FILE="${{ github.workspace }}/trivy-report-${{ inputs.service-name }}.txt"
          REPORT_BASE64=$(base64 -w 0 "$REPORT_FILE")

          # Write payload to temp file to avoid "Argument list too long"
          cat > /tmp/brevo-payload.json << EOF
          {
            "sender": {
              "name": "CI Pipeline",
              "email": "ananthvijay2003@gmail.com"
            },
            "to": [{ "email": "ananthvijay2003@gmail.com" }],
            "subject": "🚨 Trivy Vulnerabilities Detected - ${{ inputs.service-name }}",
            "textContent": "HIGH or CRITICAL vulnerabilities found in ${{ inputs.service-name }}. See attached report.",
            "attachment": [{
              "name": "trivy-report-${{ inputs.service-name }}.txt",
              "content": "$REPORT_BASE64"
            }]
          }
          EOF

          curl --request POST \
            --url https://api.brevo.com/v3/smtp/email \
            --header "accept: application/json" \
            --header "api-key: $BREVO_API_KEY" \
            --header "content-type: application/json" \
            --data @/tmp/brevo-payload.json

      - name: Push Docker Image
        if: steps.build.outputs.built == 'true' && github.event_name != 'pull_request'
        run: docker push ${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}:${{ steps.tag.outputs.tag }}

      # CREATE TAG (ONLY IF NOT EXISTS)
      - name: Create Git Tag
        if: inputs.environment == 'main' && steps.tag_check.outputs.exists != 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git tag ${{ steps.tag.outputs.tag }}
          git push origin ${{ steps.tag.outputs.tag }}
